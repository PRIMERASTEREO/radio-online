    <style>

    <script>
        window.handleiTunesResponse = function(data) {
            const albumArtBg = document.getElementById('album-art-bg');
            const defaultLogoUrl = 'https://primera-stereo.netlify.app/11.png';
            if (data && data.results && data.results.length > 0) {
                let highResArt = data.results[0].artworkUrl100.replace('100x100bb.jpg', '600x600bb.jpg');
                albumArtBg.style.backgroundImage = `url('${highResArt}')`;
            } else { albumArtBg.style.backgroundImage = `url('${defaultLogoUrl}')`; }
            const oldScript = document.getElementById('itunes-jsonp');
            if (oldScript) oldScript.remove();
        };

        document.addEventListener('DOMContentLoaded', function() {
            const audioPlayer = new Audio();
            const playBtn = document.getElementById('play-btn');
            const volumeSlider = document.getElementById('volume-slider');
            const statusIcon = document.getElementById('status-icon');
            const statusText = document.getElementById('status-text');
            const bars = document.querySelectorAll('#radio-visualizer .bar');
            const albumArtBg = document.getElementById('album-art-bg');
            const playerCard = document.getElementById('player-card');
            const hoverControl = document.getElementById('hover-control');
            const streamUrl = 'https://primerastereo.stream.laut.fm/primerastereo';
            const metadataApiUrl = 'https://api.laut.fm/station/primerastereo/current_song';
            const defaultLogoUrl = 'https://primera-stereo.netlify.app/11.png'; 
            const YOUTUBE_API_KEY = "AIzaSyCxU2onHMctFbLj0UKLt-SHjw8V80bmGgg";
            let ytPlayer = null, isPlayerReady = false, lastVideoQuery = "", currentArtistGlobal = "", currentTrackGlobal = "", isPlaying = false, metadataInterval = null, visualizerInterval = null;
            
            audioPlayer.src = streamUrl;
            audioPlayer.volume = volumeSlider.value;
            albumArtBg.style.backgroundImage = `url('${defaultLogoUrl}')`;

            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

            window.onYouTubeIframeAPIReady = function() {
                ytPlayer = new YT.Player('yt-player-element', {
                    height: '100%', width: '100%', videoId: 'dQw4w9WgXcQ', 
                    playerVars: { 'autoplay': 1, 'controls': 0, 'rel': 0, 'loop': 1, 'mute': 1, 'playsinline': 1, 'disablekb': 1, 'origin': window.location.origin },
                    events: {
                        'onReady': function(event) { event.target.mute(); isPlayerReady = true; if (currentTrackGlobal && currentArtistGlobal) { searchAndPlayVideo(currentTrackGlobal, currentArtistGlobal); } },
                        'onError': function() { isPlayerReady = true; fallbackToArtMode(); }
                    }
                });
            };

            function togglePlayback() {
                if (isPlaying) {
                    audioPlayer.pause();
                    if (ytPlayer && ytPlayer.pauseVideo && playerCard.classList.contains('video-mode')) { try { ytPlayer.pauseVideo(); } catch(e){} }
                    playBtn.innerHTML = '<i class="fas fa-play"></i>';
                    stopVisualizer();
                    isPlaying = false;
                } else {
                    audioPlayer.play().then(() => {
                        if (ytPlayer && ytPlayer.playVideo && playerCard.classList.contains('video-mode')) { try { ytPlayer.playVideo(); } catch(e){} }
                        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                        startVisualizer();
                        isPlaying = true;
                    }).catch(err => { console.error("Error al arrancar audio stream:", err); });
                }
            }
            playBtn.addEventListener('click', togglePlayback);
            volumeSlider.addEventListener('input', function() { audioPlayer.volume = this.value; });

            function startVisualizer() {
                clearInterval(visualizerInterval);
                visualizerInterval = setInterval(() => {
                    bars.forEach(bar => { if (isPlaying) { const height = Math.floor(Math.random() * 30) + 5; bar.style.height = `${height}px`; } });
                }, 150);
            }
            function stopVisualizer() { clearInterval(visualizerInterval); bars.forEach(bar => bar.style.height = '5px'); }

            function getAlbumArt(track, artist) {
                const query = `${artist} ${track}`;
                const oldScript = document.getElementById('itunes-jsonp');
                if (oldScript) oldScript.remove();
                const script = document.createElement('script');
                script.id = 'itunes-jsonp';
                script.src = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=1&callback=handleiTunesResponse`;
                script.onerror = function() { albumArtBg.style.backgroundImage = `url('${defaultLogoUrl}')`; };
                document.body.appendChild(script);
            }

            async function searchAndPlayVideo(track, artist) {
                const trackUpper = track.toUpperCase();
                const artistUpper = artist.toUpperCase();

                if (trackUpper.includes("PRIMERA STEREO") || artistUpper.includes("PRIMERA STEREO") || trackUpper.includes("JINGLE")) {
                    if (ytPlayer && ytPlayer.stopVideo) { try { ytPlayer.stopVideo(); } catch(e){} }
                    albumArtBg.style.backgroundImage = `url('${defaultLogoUrl}')`;
                    playerCard.classList.remove('video-mode');
                    return;
                }

                let cleanTrack = track.replace(/\(.*?\)/g, "").replace(/\[.*?\]/g, "").trim();
                const videoQuery = `${artist} ${cleanTrack} -lyrics -karaoke -lyric -instrumental`;
                
                getAlbumArt(cleanTrack, artist);
                
                try {
                    const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=${encodeURIComponent(videoQuery)}&type=video&key=${YOUTUBE_API_KEY}`;
                    const response = await fetch(searchUrl);
                    const data = await response.json();
                    
                    const validVideo = data.items.find(item => {
                        const title = item.snippet.title.toUpperCase();
                        return !title.includes("LYRICS") && !title.includes("KARAOKE") && !title.includes("LYRIC");
                    });

                    if (validVideo) {
                        executeVideoLoad(validVideo.id.videoId);
                    } else {
                        fallbackToArtMode();
                    }
                } catch (error) { fallbackToArtMode(); }
            }

            function fallbackToArtMode() {
                playerCard.classList.remove('video-mode');
                playerCard.classList.add('art-mode');
                hoverControl.classList.remove('controls-hidden');
            }

            function executeVideoLoad(videoId) {
                if (!isPlayerReady || !ytPlayer) return;
                try {
                    ytPlayer.loadVideoById({ videoId: videoId, startSeconds: 0 });
                    ytPlayer.mute();
                    playerCard.classList.remove('art-mode');
                    playerCard.classList.add('video-mode');
                    hoverControl.classList.add('controls-hidden'); 
                } catch (err) { fallbackToArtMode(); }
            }
            
            async function updateMetadata() {
                try {
                    const response = await fetch(metadataApiUrl + '?t=' + new Date().getTime());
                    const data = await response.json();
                    if (data && data.title) {
                        const currentTrack = data.title;
                        const currentArtist = (data.artist && data.artist.name) ? data.artist.name : 'PRIMERA STEREO';
                        statusText.innerHTML = `<span class='metadata-artist'>${currentArtist}</span> - <span class='metadata-track'>${currentTrack}</span>`;
                        if (currentArtist !== currentArtistGlobal || currentTrack !== currentTrackGlobal) {
                            currentArtistGlobal = currentArtist; currentTrackGlobal = currentTrack;
                            searchAndPlayVideo(currentTrack, currentArtist);
                        }
                    }
                } catch (error) { console.error(error); }
            }
            updateMetadata();
            setInterval(updateMetadata, 60000);

            setTimeout(() => {
                if (!isPlaying) {
                    togglePlayback();
                }
            }, 2000);
        });
    </script>
